<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebSim experimental platform</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <h1>WebSim experimental platform</h1>
    <p class="subtitle"><a href="/swipe">Open the swipe-based recommendation page</a></p>
    <p class="subtitle">Switch across MovieLens-1M, Amazon All Beauty, and Amazon Magazine Subscriptions, and test PopRec, BPR-MF, GRU4Rec, BERT4Rec, SASRec, LightGCN, and Mult-VAE in one interface.</p>

    <section class="toolbar">
      <label for="datasetSelect">Dataset</label>
      <select id="datasetSelect">
        <option value="ml1m">MovieLens-1M</option>
        <option value="amazon_all_beauty">Amazon All Beauty</option>
        <option value="amazon_magazine_subscriptions">Amazon Magazine Subscriptions</option>
      </select>

      <label for="algoSelect">Inference Model</label>
      <select id="algoSelect">
        <option value="poprec">PopRec</option>
        <option value="bprmf">BPR-MF</option>
        <option value="gru4rec">GRU4Rec</option>
        <option value="bert4rec">BERT4Rec</option>
        <option value="sasrec">SASRec</option>
        <option value="lightgcn">LightGCN</option>
        <option value="multvae">Mult-VAE</option>
      </select>
      <label for="historyCommentSelect">History Comments</label>
      <select id="historyCommentSelect">
        <option value="show">Show</option>
        <option value="hide">Hide</option>
      </select>
      <button id="resetBtn" type="button">Random Reset</button>
      <button id="nextBtn" type="button">Next Page</button>
      <span id="statusText">Loading...</span>
    </section>

    <section id="grid" class="grid"></section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
